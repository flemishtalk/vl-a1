<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nederlands - Oefentest</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400;500;600&display=swap');
:root{--bg:#0f1117;--surface:#181b27;--surface2:#1e2235;--border:rgba(255,255,255,0.08);--accent:#6c8eff;--accent2:#b48cff;--green:#10b981;--red:#f43f5e;--text:#e8eaf0;--muted:#7a7f9a;--radius:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
.screen{display:none;}.screen.active{display:block;}
header{padding:32px 24px 20px;text-align:center;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(108,142,255,0.07) 0%,transparent 100%);}
header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.6rem,4vw,2.2rem);background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px;}
header p{color:var(--muted);font-size:0.85rem;margin-top:6px;}
.setup{max-width:560px;margin:0 auto;padding:40px 24px;}
.setup h2{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:24px;}
.option-group{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.option-label{font-size:0.78rem;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.toggle-row{display:flex;gap:8px;flex-wrap:wrap;}
.tog{padding:9px 18px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:0.82rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.15s;}
.tog.on{border-color:var(--accent);color:var(--accent);background:rgba(108,142,255,0.1);}
.tog.green.on{border-color:var(--green);color:var(--green);background:rgba(16,185,129,0.1);}
.q-count{display:flex;align-items:center;gap:12px;}
.q-count input[type=range]{flex:1;accent-color:var(--accent);}
.q-count span{min-width:28px;text-align:right;font-weight:600;font-size:0.9rem;}
.start-btn{width:100%;padding:14px;border-radius:var(--radius);background:linear-gradient(90deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:1rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:opacity 0.15s;}
.start-btn:hover{opacity:0.9;}
.quiz-wrap{max-width:620px;margin:0 auto;padding:32px 24px 60px;}
.progress-bar-wrap{margin-bottom:24px;}
.progress-meta{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);margin-bottom:8px;}
.progress-track{height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 0.4s;}
.score-live{font-size:0.75rem;font-weight:600;color:var(--muted);}
.s-correct{color:var(--green);}.s-wrong{color:var(--red);}
.q-card{background:var(--surface2);border-radius:var(--radius);border:1.5px solid var(--border);padding:28px 24px 24px;margin-bottom:18px;}
.q-type-badge{display:inline-block;font-size:0.63rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:3px 10px;border-radius:999px;margin-bottom:14px;}
.badge-mc{background:rgba(108,142,255,0.15);color:var(--accent);}
.badge-fill{background:rgba(16,185,129,0.15);color:var(--green);}
.q-prompt{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:700;line-height:1.35;margin-bottom:6px;}
.q-sub{font-size:0.8rem;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.options{display:flex;flex-direction:column;gap:10px;}
.opt{padding:12px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:0.88rem;font-family:'Inter',sans-serif;cursor:pointer;text-align:left;transition:all 0.15s;line-height:1.4;}
.opt:hover:not(:disabled){border-color:var(--accent);background:rgba(108,142,255,0.07);}
.opt.correct{border-color:var(--green)!important;background:rgba(16,185,129,0.12)!important;color:var(--green);}
.opt.wrong{border-color:var(--red)!important;background:rgba(244,63,94,0.12)!important;color:var(--red);}
.opt.reveal{border-color:var(--green);background:rgba(16,185,129,0.08);color:var(--green);}
.opt:disabled{cursor:default;}
.fill-wrap{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.fill-input{flex:1;min-width:180px;padding:12px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:0.95rem;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s;}
.fill-input:focus{border-color:var(--accent);}
.fill-input.correct{border-color:var(--green);background:rgba(16,185,129,0.1);}
.fill-input.wrong{border-color:var(--red);background:rgba(244,63,94,0.1);}
.check-btn{padding:12px 22px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-weight:600;font-size:0.88rem;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity 0.15s;white-space:nowrap;}
.check-btn:hover{opacity:0.85;}.check-btn:disabled{opacity:0.4;cursor:default;}
.feedback{margin-top:14px;padding:12px 16px;border-radius:10px;font-size:0.84rem;line-height:1.5;display:none;}
.feedback.correct{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.25);}
.feedback.wrong{background:rgba(244,63,94,0.1);color:#fb7185;border:1px solid rgba(244,63,94,0.25);}
.next-btn{width:100%;padding:13px;border-radius:var(--radius);background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-size:0.9rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.15s;display:none;margin-top:14px;}
.next-btn:hover{border-color:var(--accent);color:var(--accent);}
.results{max-width:560px;margin:0 auto;padding:40px 24px 60px;text-align:center;}
.score-circle{width:130px;height:130px;border-radius:50%;background:conic-gradient(var(--accent) 0%,var(--surface2) 0%);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;position:relative;}
.score-circle::before{content:'';position:absolute;inset:10px;border-radius:50%;background:var(--bg);}
.score-num{position:relative;z-index:1;font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;color:var(--text);}
.result-label{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:8px;}
.result-sub{color:var(--muted);font-size:0.88rem;margin-bottom:32px;}
.result-breakdown{display:flex;gap:16px;justify-content:center;margin-bottom:36px;flex-wrap:wrap;}
.breakdown-box{background:var(--surface2);border-radius:var(--radius);border:1.5px solid var(--border);padding:16px 24px;min-width:110px;}
.breakdown-box .val{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;}
.breakdown-box .lbl{font-size:0.72rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}
.val-green{color:var(--green);}.val-red{color:var(--red);}.val-acc{color:var(--accent);}
.review-list{text-align:left;margin-bottom:32px;}
.review-list h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:14px;color:var(--red);}
.review-item{background:var(--surface2);border-radius:10px;border:1px solid var(--border);padding:12px 16px;margin-bottom:8px;font-size:0.83rem;line-height:1.6;}
.review-item .ri-q{color:var(--muted);font-size:0.75rem;}
.review-item .ri-wrong{color:var(--red);}
.review-item .ri-correct{color:var(--green);font-weight:600;}
.action-btns{display:flex;gap:12px;flex-wrap:wrap;}
.action-btns button{flex:1;padding:13px;border-radius:var(--radius);font-size:0.88rem;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.15s;}
.btn-retry{background:linear-gradient(90deg,var(--accent),var(--accent2));border:none;color:#fff;}
.btn-setup{background:transparent;border:1.5px solid var(--border);color:var(--muted);}
.btn-setup:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>
<header>
  <h1>Nederlands - Oefentest</h1>
  <p>Werkwoorden - Zinnen - Woordenschat</p>
</header>

<div class="screen active" id="screen-setup">
  <div class="setup">
    <h2>Stel je test in</h2>
    <div class="option-group">
      <div class="option-label">Vraagtype</div>
      <div class="toggle-row">
        <button class="tog on" id="tog-mc" onclick="toggleOpt('mc')">Meerkeuze</button>
        <button class="tog on" id="tog-fill" onclick="toggleOpt('fill')">Invullen</button>
      </div>
    </div>
    <div class="option-group">
      <div class="option-label">Inhoud</div>
      <div class="toggle-row">
        <button class="tog on green" id="tog-verbs" onclick="toggleOpt('verbs')">Werkwoorden</button>
        <button class="tog on green" id="tog-phrases" onclick="toggleOpt('phrases')">Zinnen &amp; woorden</button>
      </div>
    </div>
    <div class="option-group">
      <div class="option-label">Richting</div>
      <div class="toggle-row">
        <button class="tog on" id="tog-nl2pl" onclick="toggleDir('nl2pl')">NL naar PL</button>
        <button class="tog on" id="tog-pl2nl" onclick="toggleDir('pl2nl')">PL naar NL</button>
      </div>
    </div>
    <div class="option-group">
      <div class="option-label">Aantal vragen: <span id="q-count-lbl">30</span></div>
      <div class="q-count">
        <input type="range" id="q-range" min="5" max="120" value="30"
               oninput="document.getElementById('q-count-lbl').textContent=this.value">
      </div>
    </div>
    <button class="start-btn" onclick="startQuiz()">Start de test</button>
  </div>
</div>

<div class="screen" id="screen-quiz">
  <div class="quiz-wrap">
    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span id="q-counter">Vraag 1 / 30</span>
        <span class="score-live">Correct: <span class="s-correct" id="live-correct">0</span> &nbsp; Fout: <span class="s-wrong" id="live-wrong">0</span></span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div id="q-area"></div>
  </div>
</div>

<div class="screen" id="screen-results">
  <div class="results">
    <div class="score-circle" id="score-circle"><div class="score-num" id="score-pct">0%</div></div>
    <div class="result-label" id="result-label"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-breakdown">
      <div class="breakdown-box"><div class="val val-green" id="res-correct">0</div><div class="lbl">Correct</div></div>
      <div class="breakdown-box"><div class="val val-red" id="res-wrong">0</div><div class="lbl">Fout</div></div>
      <div class="breakdown-box"><div class="val val-acc" id="res-total">0</div><div class="lbl">Totaal</div></div>
    </div>
    <div class="review-list" id="review-list"></div>
    <div class="action-btns">
      <button class="btn-retry" onclick="retryQuiz()">Opnieuw proberen</button>
      <button class="btn-setup" onclick="showSetup()">Instellingen wijzigen</button>
    </div>
  </div>
</div>

<script>
const verbCards = [
  {inf:"Doen",pl:"robić",en:"to do",perf:"gedaan",aux:"hebben",ex:"Ik heb dat gedaan.",expl:"Zrobiłem/am to."},
  {inf:"Zeggen",pl:"mówić",en:"to say",perf:"gezegd",aux:"hebben",ex:"Je hebt dat gezegd.",expl:"Powiedziałeś/aś to."},
  {inf:"Zien",pl:"widzieć",en:"to see",perf:"gezien",aux:"hebben",ex:"We hebben het gezien.",expl:"Widzieliśmy to."},
  {inf:"Horen",pl:"słyszeć",en:"to hear",perf:"gehoord",aux:"hebben",ex:"Heb je dat gehoord?",expl:"Słyszałeś/aś to?"},
  {inf:"Hebben",pl:"mieć",en:"to have",perf:"gehad",aux:"hebben",ex:"Zij heeft geluk gehad.",expl:"Ona miała szczęście."},
  {inf:"Maken",pl:"robić/tworzyć",en:"to make",perf:"gemaakt",aux:"hebben",ex:"We hebben dat zelf gemaakt.",expl:"Zrobiliśmy to sami."},
  {inf:"Kopen",pl:"kupować",en:"to buy",perf:"gekocht",aux:"hebben",ex:"Ik heb een nieuwe auto gekocht.",expl:"Kupiłem/am nowy samochód."},
  {inf:"Eten",pl:"jeść",en:"to eat",perf:"gegeten",aux:"hebben",ex:"Heb je al gegeten?",expl:"Czy już jadłeś/aś?"},
  {inf:"Drinken",pl:"pić",en:"to drink",perf:"gedronken",aux:"hebben",ex:"We hebben iets gedronken.",expl:"Wypiliśmy coś."},
  {inf:"Lezen",pl:"czytać",en:"to read",perf:"gelezen",aux:"hebben",ex:"Ik heb die krant gelezen.",expl:"Przeczytałem/am tę gazetę."},
  {inf:"Schrijven",pl:"pisać",en:"to write",perf:"geschreven",aux:"hebben",ex:"Wie heeft dat geschreven?",expl:"Kto to napisał?"},
  {inf:"Kijken",pl:"patrzeć/oglądać",en:"to watch",perf:"gekeken",aux:"hebben",ex:"We hebben gisteren naar die nieuwe film gekeken.",expl:"Wczoraj obejrzeliśmy ten nowy film."},
  {inf:"Krijgen",pl:"dostać/otrzymać",en:"to get/receive",perf:"gekregen",aux:"hebben",ex:"Ik heb een cadeau gekregen.",expl:"Dostałem/am prezent."},
  {inf:"Denken",pl:"myśleć",en:"to think",perf:"gedacht",aux:"hebben",ex:"Ik heb daaraan gedacht.",expl:"Myślałem/am o tym."},
  {inf:"Weten",pl:"wiedzieć",en:"to know",perf:"geweten",aux:"hebben",ex:"Ik heb dat nooit geweten.",expl:"Nigdy o tym nie wiedziałem/am."},
  {inf:"Praten",pl:"rozmawiać",en:"to talk",perf:"gepraat",aux:"hebben",ex:"We hebben lang gepraat.",expl:"Długo rozmawialiśmy.",altNL:["babbelen"],altPL:["gadac","paplac","gawedzic"]},
  {inf:"Zetten",pl:"kłaść/stawiać",en:"to put/set",perf:"gezet",aux:"hebben",ex:"Waar heb je dat gezet?",expl:"Gdzie to postawiłeś/aś?"},
  {inf:"Pakken",pl:"brać/chwytać",en:"to take/grab",perf:"gepakt",aux:"hebben",ex:"Hij heeft zijn jas gepakt.",expl:"Wziął swój płaszcz."},
  {inf:"Betalen",pl:"płacić",en:"to pay",perf:"betaald",aux:"hebben",ex:"Ik heb de rekening al betaald.",expl:"Zapłaciłem/am już rachunek."},
  {inf:"Vragen",pl:"pytać",en:"to ask",perf:"gevraagd",aux:"hebben",ex:"Wat heb je aan hem gevraagd?",expl:"O co go zapytałeś/aś?"},
  {inf:"Leren",pl:"uczyć się",en:"to learn",perf:"geleerd",aux:"hebben",ex:"Ik heb veel geleerd vandaag.",expl:"Dużo się dziś nauczyłem/am."},
  {inf:"Kiezen",pl:"wybierać",en:"to choose",perf:"gekozen",aux:"hebben",ex:"We hebben de rode gekozen.",expl:"Wybraliśmy czerwony."},
  {inf:"Slapen",pl:"spać",en:"to sleep",perf:"geslapen",aux:"hebben",ex:"Heb je goed geslapen?",expl:"Czy dobrze spałeś/aś?"},
  {inf:"Wachten",pl:"czekać",en:"to wait",perf:"gewacht",aux:"hebben",ex:"We hebben lang gewacht.",expl:"Długo czekaliśmy."},
  {inf:"Babbelen",pl:"gadać/paplać",en:"to chat/chatter",perf:"gebabbeld",aux:"hebben",ex:"Ze hebben de hele nacht gebabbeld.",expl:"Gadały całą noc.",altNL:["praten"],altPL:["rozmawiac","gadac","paplac"]},
  {inf:"Snoeien",pl:"przycinać",en:"to prune/trim",perf:"gesnoeid",aux:"hebben",ex:"Ik heb de struiken gesnoeid.",expl:"Przyciąłem/am krzewy."},
  {inf:"Aaien",pl:"głaskać",en:"to stroke/pet",perf:"geaaid",aux:"hebben",ex:"Ik heb de katjes geaaid.",expl:"Pogłaskałem/am kotki."},
  {inf:"Knuffelen",pl:"przytulać/pieścić",en:"to cuddle/hug",perf:"geknuffeld",aux:"hebben",ex:"Ik heb de katjes geknuffeld.",expl:"Przytuliłem/am kotki."},
  {inf:"Ordenen",pl:"uporządkować",en:"to organise/sort",perf:"geordend",aux:"hebben",ex:"Ik moet alles ordenen.",expl:"Muszę wszystko uporządkować."},
  {inf:"Verkopen",pl:"sprzedawać",en:"to sell",perf:"verkocht",aux:"hebben",ex:"Ik heb een iPod verkocht.",expl:"Sprzedałem/am iPoda."},
  {inf:"Zijn",pl:"być",en:"to be",perf:"geweest",aux:"zijn",ex:"Ik ben er geweest.",expl:"Byłem/am tam."},
  {inf:"Gaan",pl:"iść/chodzić",en:"to go",perf:"gegaan",aux:"zijn",ex:"Waar ben je naartoe gegaan?",expl:"Dokąd poszedłeś/aś?"},
  {inf:"Komen",pl:"przychodzić",en:"to come",perf:"gekomen",aux:"zijn",ex:"Zij is gisteren gekomen.",expl:"Ona przyszła wczoraj."},
  {inf:"Worden",pl:"stawać się",en:"to become",perf:"geworden",aux:"zijn",ex:"Hij is gisteren dertig geworden.",expl:"On wczoraj skończył trzydzieści lat."},
  {inf:"Blijven",pl:"zostawać",en:"to stay",perf:"gebleven",aux:"zijn",ex:"We zijn thuis gebleven.",expl:"Zostaliśmy w domu."},
  {inf:"Vallen",pl:"padać/upadać",en:"to fall",perf:"gevallen",aux:"zijn",ex:"Pas op, het is gevallen.",expl:"Uważaj, to spadło."},
  {inf:"Vertrekken",pl:"wyjeżdżać",en:"to leave/depart",perf:"vertrokken",aux:"zijn",ex:"De trein is al vertrokken.",expl:"Pociąg już odjechał."},
  {inf:"Stoppen",pl:"zatrzymywać się",en:"to stop",perf:"gestopt",aux:"zijn",ex:"De auto is gestopt.",expl:"Samochód zatrzymał się."},
  {inf:"Gebeuren",pl:"zdarzać się",en:"to happen",perf:"gebeurd",aux:"zijn",ex:"Wat is er gebeurd?",expl:"Co się stało?"},
  {inf:"Lopen",pl:"chodzić/biec",en:"to walk/run",perf:"gelopen",aux:"zijn",ex:"Is het mis gelopen?",expl:"Czy coś poszło nie tak?"},
  {inf:"Sterven",pl:"umierać",en:"to die",perf:"gestorven",aux:"zijn",ex:"Onze goudvis is gestorven.",expl:"Nasza złota rybka zdechła."},
  {inf:"Beginnen",pl:"zaczynać",en:"to begin",perf:"begonnen",aux:"zijn",ex:"De match is begonnen.",expl:"Mecz się zaczął."},
  {inf:"Slagen",pl:"udać się/zdać",en:"to succeed",perf:"geslaagd",aux:"zijn",ex:"Zij is geslaagd voor haar examen!",expl:"Zdała egzamin!"},
  {inf:"Veranderen",pl:"zmieniać się",en:"to change",perf:"veranderd",aux:"zijn",ex:"De plannen zijn veranderd.",expl:"Plany się zmieniły."},
  {inf:"Groeien",pl:"rosnąć",en:"to grow",perf:"gegroeid",aux:"zijn",ex:"De struiken zijn hard gegroeid.",expl:"Krzewy bardzo urosły."},
  {inf:"Vermageren",pl:"chudnąć/szczupleć",en:"to lose weight",perf:"vermagerd",aux:"zijn",ex:"Filemon is vermagerd.",expl:"Filemon schudł/zeszczuplał."},
  {inf:"Bijkomen",pl:"przytyć",en:"to gain weight",perf:"bijgekomen",aux:"zijn",ex:"Gili is bijgekomen.",expl:"Gili przytyła."}
];

const phraseCards = [
  {nl:"Ik ben het niet meer gewoon.",pl:"Odzwyczaiłem/am się.",note:"Już nie jestem do tego przyzwyczajony/a."},
  {nl:"de struiken",pl:"krzaki / krzewy",note:""},
  {nl:"de verzending is inbegrepen",pl:"wysyłka jest wliczona w cenę",note:"inbegrepen = wliczony/zawarty"},
  {nl:"de vloer is nat",pl:"podłoga jest mokra",note:""},
  {nl:"Ik moet meer plaats maken in mijn (werk)kot.",pl:"Muszę zrobić więcej miejsca w moim biurze/pokoju.",note:"(werk)kot = małe biuro domowe"},
  {nl:"een klachtenformulier invullen",pl:"wypełnić formularz reklamacyjny",note:"klacht = skarga, formulier = formularz"},
  {nl:"De iPod is naar Zimbabwe gekomen.",pl:"iPod dotarł do Zimbabwe.",note:""},
  {nl:"Zij hebben deze iPod naar België teruggestuurd.",pl:"Odesłali tego iPoda z powrotem do Belgii.",note:"terugsturen = odesłać"},
  {nl:"Zij hebben het drie keer gedaan.",pl:"Zrobili to trzy razy.",note:""},
  {nl:"Hoe is het opgelost geraakt?",pl:"Jak to zostało rozwiązane?",note:"oplossen = rozwiązać"},
  {nl:"Je kan er niks mee regelen.",pl:"Nic się nie da z nimi załatwić.",note:"regelen = załatwić/zorganizować"}
];

const opts={mc:true,fill:true,verbs:true,phrases:true};
const dirs={nl2pl:true,pl2nl:true};
function toggleOpt(k){opts[k]=!opts[k];document.getElementById('tog-'+k).classList.toggle('on',opts[k]);}
function toggleDir(k){dirs[k]=!dirs[k];document.getElementById('tog-'+k).classList.toggle('on',dirs[k]);}

// Strip diacritics AND punctuation for comparison
function norm(s){
  if(!s)return'';
  return s.toLowerCase()
    .replace(/[ą]/g,'a').replace(/[ć]/g,'c').replace(/[ę]/g,'e')
    .replace(/[ł]/g,'l').replace(/[ń]/g,'n').replace(/[ó]/g,'o')
    .replace(/[ś]/g,'s').replace(/[ź]/g,'z').replace(/[ż]/g,'z')
    .replace(/[à-äå]/g,'a').replace(/[è-ë]/g,'e').replace(/[ì-ï]/g,'i')
    .replace(/[ò-öø]/g,'o').replace(/[ù-ü]/g,'u').replace(/[ß]/g,'ss')
    .replace(/[^a-z0-9 ]/g,'')
    .replace(/\s+/g,' ').trim();
}

function isMatch(typed,q){
  const t=norm(typed);
  const answers=[q.answer,...(q.altAnswers||[])];
  for(const a of answers){
    const tokens=String(a).split('/').map(x=>norm(x.trim()));
    if(tokens.some(tok=>tok&&t===tok))return true;
  }
  return false;
}

function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function pick(a,n){return shuffle(a).slice(0,n);}

function allTemplates(){
  const t=[];
  verbCards.forEach(d=>{
    if(dirs.nl2pl)t.push({kind:'verb',data:d,variant:'translate',dir:'nl2pl'});
    if(dirs.pl2nl)t.push({kind:'verb',data:d,variant:'translate',dir:'pl2nl'});
    t.push({kind:'verb',data:d,variant:'perf',dir:'nl2pl'});
  });
  phraseCards.forEach(d=>{
    if(dirs.nl2pl)t.push({kind:'phrase',data:d,variant:'translate',dir:'nl2pl'});
    if(dirs.pl2nl)t.push({kind:'phrase',data:d,variant:'translate',dir:'pl2nl'});
  });
  return t;
}

function buildQuestions(count){
  const pool=[];
  if(opts.verbs)verbCards.forEach(d=>pool.push({kind:'verb',data:d}));
  if(opts.phrases)phraseCards.forEach(d=>pool.push({kind:'phrase',data:d}));
  if(!pool.length)return[];
  const qtypes=[];
  if(opts.mc)qtypes.push('mc');
  if(opts.fill)qtypes.push('fill');
  if(!qtypes.length)return[];
  if(!dirs.nl2pl&&!dirs.pl2nl){dirs.nl2pl=true;document.getElementById('tog-nl2pl').classList.add('on');}
  const templates=shuffle(allTemplates().filter(t=>{
    if(t.kind==='verb'&&!opts.verbs)return false;
    if(t.kind==='phrase'&&!opts.phrases)return false;
    if(t.dir==='nl2pl'&&!dirs.nl2pl)return false;
    if(t.dir==='pl2nl'&&!dirs.pl2nl)return false;
    return true;
  }));
  if(!templates.length)return[];
  let bag=[];
  while(bag.length<count)bag=bag.concat(shuffle(templates));
  bag=bag.slice(0,count);
  return bag.map(t=>{
    const qt=qtypes[Math.floor(Math.random()*qtypes.length)];
    return makeQ(t,qt,pool);
  });
}

function makeQ(t,qtype,pool){
  const d=t.data,isVerb=t.kind==='verb';
  let prompt,sub,answer,answerDisplay,altAnswers=[];

  if(isVerb&&t.variant==='perf'){
    const gapped=d.ex.replace(new RegExp(d.perf,'gi'),'___');
    return{qtype:'fill',prompt:gapped,sub:'Vul het participium in. ('+d.pl+' \u00b7 '+d.aux+')',
      answer:norm(d.perf),answerDisplay:d.perf,altAnswers:[],expl:d.expl,extra:'Volledige zin: '+d.ex};
  }
  if(isVerb){
    if(t.dir==='nl2pl'){
      prompt=d.inf;sub='Poolse vertaling? (perf: '+d.perf+' \u00b7 '+d.aux+')';
      answer=norm(d.pl.split('/')[0]);answerDisplay=d.pl;
      if(d.altPL)altAnswers=d.altPL.map(norm);
    }else{
      prompt=d.pl;sub='Nederlands werkwoord? (perf: '+d.perf+' \u00b7 '+d.aux+')';
      answer=norm(d.inf);answerDisplay=d.inf;
      if(d.altNL)altAnswers=d.altNL.map(norm);
    }
  }else{
    if(t.dir==='nl2pl'){
      prompt=d.nl;sub='Poolse vertaling?';
      answer=norm(d.pl.split('/')[0]);answerDisplay=d.pl;
    }else{
      prompt=d.pl;sub='Nederlandse uitdrukking?';
      answer=norm(d.nl);answerDisplay=d.nl;
    }
  }

  if(qtype==='mc'){
    const same=pool.filter(p=>p.kind===t.kind&&p.data!==d);
    const wrong3=pick(same,3).map(p=>{
      if(p.kind==='verb')return t.dir==='nl2pl'?p.data.pl:p.data.inf;
      return t.dir==='nl2pl'?p.data.pl:p.data.nl;
    });
    const options=shuffle([answerDisplay,...wrong3]);
    return{qtype:'mc',prompt,sub,answer,answerDisplay,altAnswers,options,expl:isVerb?d.expl:(d.note||'')};
  }
  return{qtype:'fill',prompt,sub,answer,answerDisplay,altAnswers,expl:isVerb?d.expl:(d.note||'')};
}

let questions=[],qIdx=0,correct=0,wrong=0,mistakes=[],answered=false;
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');}

function startQuiz(){
  const count=parseInt(document.getElementById('q-range').value);
  if(!opts.mc&&!opts.fill){alert('Selecteer minstens een vraagtype.');return;}
  if(!opts.verbs&&!opts.phrases){alert('Selecteer minstens een inhoudstype.');return;}
  questions=buildQuestions(count);
  if(!questions.length){alert('Geen vragen beschikbaar met deze instellingen.');return;}
  qIdx=0;correct=0;wrong=0;mistakes=[];answered=false;
  showScreen('quiz');renderQ();
}
function retryQuiz(){qIdx=0;correct=0;wrong=0;mistakes=[];answered=false;questions=shuffle(questions);showScreen('quiz');renderQ();}
function showSetup(){showScreen('setup');}

function updateProg(){
  const pct=Math.round((qIdx/questions.length)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('q-counter').textContent='Vraag '+(qIdx+1)+' / '+questions.length;
  document.getElementById('live-correct').textContent=correct;
  document.getElementById('live-wrong').textContent=wrong;
}

function renderQ(){
  answered=false;updateProg();
  const q=questions[qIdx];
  const area=document.getElementById('q-area');
  const bc=q.qtype==='mc'?'badge-mc':'badge-fill';
  const bt=q.qtype==='mc'?'Meerkeuze':'Invullen';
  let html='<div class="q-card"><span class="q-type-badge '+bc+'">'+bt+'</span>';
  html+='<div class="q-prompt">'+esc(q.prompt)+'</div>';
  html+='<div class="q-sub">'+esc(q.sub)+'</div>';
  if(q.qtype==='mc'){
    html+='<div class="options">';
    q.options.forEach((o,i)=>{html+='<button class="opt" id="opt-'+i+'" onclick="pickMC('+i+')">'+esc(o)+'</button>';});
    html+='</div>';
  }else{
    html+='<div class="fill-wrap"><input class="fill-input" id="fill-in" placeholder="Typ je antwoord..." onkeydown="if(event.key===\'Enter\')checkFill()">';
    html+='<button class="check-btn" id="check-btn" onclick="checkFill()">Controleer</button></div>';
  }
  html+='<div class="feedback" id="feedback"></div></div>';
  html+='<button class="next-btn" id="next-btn" onclick="nextQ()">'+(qIdx+1<questions.length?'Volgende vraag':'Resultaten bekijken')+'</button>';
  area.innerHTML=html;
  if(q.qtype==='fill')setTimeout(()=>{const i=document.getElementById('fill-in');if(i)i.focus();},50);
}

function pickMC(idx){
  if(answered)return;answered=true;
  const q=questions[qIdx];const chosen=q.options[idx];
  const isCorrect=norm(chosen)===norm(q.answerDisplay)||(q.altAnswers||[]).some(a=>norm(chosen)===norm(a));
  q.options.forEach((_,i)=>{const b=document.getElementById('opt-'+i);b.disabled=true;if(norm(q.options[i])===norm(q.answerDisplay))b.classList.add('reveal');});
  const b=document.getElementById('opt-'+idx);b.classList.remove('reveal');b.classList.add(isCorrect?'correct':'wrong');
  showFB(isCorrect,q,chosen);
  if(isCorrect)correct++;else{wrong++;mistakes.push({q,given:chosen});}
  document.getElementById('live-correct').textContent=correct;
  document.getElementById('live-wrong').textContent=wrong;
  document.getElementById('next-btn').style.display='block';
}

function checkFill(){
  if(answered)return;
  const inp=document.getElementById('fill-in');const val=inp.value.trim();if(!val)return;
  answered=true;const q=questions[qIdx];const isCorrect=isMatch(val,q);
  inp.classList.add(isCorrect?'correct':'wrong');inp.disabled=true;
  document.getElementById('check-btn').disabled=true;
  showFB(isCorrect,q,val);
  if(isCorrect)correct++;else{wrong++;mistakes.push({q,given:val});}
  document.getElementById('live-correct').textContent=correct;
  document.getElementById('live-wrong').textContent=wrong;
  document.getElementById('next-btn').style.display='block';
}

function showFB(ok,q,given){
  const fb=document.getElementById('feedback');fb.style.display='block';
  if(ok){
    fb.className='feedback correct';
    fb.innerHTML='Correct!'+(q.expl?'<br><span style="opacity:.8">'+esc(q.expl)+'</span>':'')+(q.extra?'<br><span style="opacity:.7">'+esc(q.extra)+'</span>':'');
  }else{
    fb.className='feedback wrong';
    fb.innerHTML='Fout: <span style="text-decoration:line-through">'+esc(given)+'</span><br>Correct: <strong>'+esc(q.answerDisplay)+'</strong>'+(q.expl?'<br><span style="opacity:.8">'+esc(q.expl)+'</span>':'');
  }
}

function nextQ(){qIdx++;if(qIdx>=questions.length){showResults();return;}renderQ();}

function showResults(){
  showScreen('results');
  const total=questions.length,pct=Math.round((correct/total)*100);
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('res-correct').textContent=correct;
  document.getElementById('res-wrong').textContent=wrong;
  document.getElementById('res-total').textContent=total;
  document.getElementById('score-circle').style.background='conic-gradient(var(--accent) '+pct*3.6+'deg,var(--surface2) '+pct*3.6+'deg)';
  let label,sub;
  if(pct>=90){label='Uitstekend!';sub='Je beheerst dit materiaal heel goed!';}
  else if(pct>=70){label='Goed gedaan!';sub='Nog een beetje oefenen en je bent er.';}
  else if(pct>=50){label='Blijf oefenen!';sub='Je bent op de goede weg, herhaal de fouten.';}
  else{label='Niet opgeven!';sub='Bekijk de flashcards opnieuw en probeer het nogmaals.';}
  document.getElementById('result-label').textContent=label;
  document.getElementById('result-sub').textContent=sub;
  const rl=document.getElementById('review-list');
  if(mistakes.length){
    rl.innerHTML='<h3>Fouten om te herhalen ('+mistakes.length+')</h3>';
    mistakes.forEach(m=>{rl.innerHTML+='<div class="review-item"><div class="ri-q">Vraag: '+esc(m.q.prompt)+'</div><div class="ri-wrong">Jouw antwoord: '+esc(m.given)+'</div><div class="ri-correct">Correct: '+esc(m.q.answerDisplay)+'</div></div>';});
  }else{
    rl.innerHTML='<p style="color:var(--green);font-weight:600;margin-bottom:16px">Geen fouten! Perfect gescoord!</p>';
  }
}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
